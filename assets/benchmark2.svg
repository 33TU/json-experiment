<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1420" viewBox="0 0 1200 1420" role="img" aria-labelledby="title desc">
  <title id="title">JSON marshal benchmark latency with reusable Sonic encoder</title>
  <desc id="desc">Five-run median latency normalized to MarshalAppend. Lower is better.</desc>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #d8dee9; }
    .title { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 28px; font-weight: 700; }
    .subtitle { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 15px; fill: #aab4c3; }
    .group { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 18px; font-weight: 650; }
    .series { font-size: 13px; fill: #c4ccd8; }
    .value { font-size: 13px; font-weight: 650; }
    .tick { font-size: 12px; fill: #788596; }
    .grid { stroke: #293344; stroke-width: 1; }
  </style>
  <rect width="1200" height="1420" rx="14" fill="#10151d"/>
  <text class="title" x="40" y="48">Marshal latency by workload</text>
  <text class="subtitle" x="40" y="76">Go 1.26 with SIMD; five-run median relative to MarshalAppend (1×). Shorter is faster.</text>

  <rect x="40" y="96" width="14" height="14" rx="3" fill="#50c878"/><text class="series" x="62" y="108">MarshalAppend</text>
  <rect x="190" y="96" width="14" height="14" rx="3" fill="#5aa9e6"/><text class="series" x="212" y="108">Marshal</text>
  <rect x="300" y="96" width="14" height="14" rx="3" fill="#ef8354"/><text class="series" x="322" y="108">encoding/json</text>
  <rect x="450" y="96" width="14" height="14" rx="3" fill="#b388eb"/><text class="series" x="472" y="108">Sonic Marshal</text>
  <rect x="600" y="96" width="14" height="14" rx="3" fill="#f2c14e"/><text class="series" x="622" y="108">Sonic EncodeInto</text>

  <!-- Shared grid: 75 pixels per 1x. -->
  <g>
    <line class="grid" x1="335" y1="130" x2="335" y2="1375"/><text class="tick" x="328" y="1397">1×</text>
    <line class="grid" x1="410" y1="130" x2="410" y2="1375"/><text class="tick" x="403" y="1397">2×</text>
    <line class="grid" x1="485" y1="130" x2="485" y2="1375"/><text class="tick" x="478" y="1397">3×</text>
    <line class="grid" x1="560" y1="130" x2="560" y2="1375"/><text class="tick" x="553" y="1397">4×</text>
    <line class="grid" x1="635" y1="130" x2="635" y2="1375"/><text class="tick" x="628" y="1397">5×</text>
    <line class="grid" x1="710" y1="130" x2="710" y2="1375"/><text class="tick" x="703" y="1397">6×</text>
    <line class="grid" x1="785" y1="130" x2="785" y2="1375"/><text class="tick" x="778" y="1397">7×</text>
    <line class="grid" x1="860" y1="130" x2="860" y2="1375"/><text class="tick" x="853" y="1397">8×</text>
  </g>

  <!-- Each bar begins at x=260. -->
  <g transform="translate(0,145)">
    <text class="group" x="40" y="13">map[string]int</text>
    <text class="series" x="245" y="39" text-anchor="end">append</text><rect x="260" y="25" width="75" height="19" rx="4" fill="#50c878"/><text class="value" x="345" y="39">201.6 ns</text>
    <text class="series" x="245" y="67" text-anchor="end">marshal</text><rect x="260" y="53" width="136" height="19" rx="4" fill="#5aa9e6"/><text class="value" x="406" y="67">366.5 ns</text>
    <text class="series" x="245" y="95" text-anchor="end">stdlib</text><rect x="260" y="81" width="566" height="19" rx="4" fill="#ef8354"/><text class="value" x="836" y="95">1521 ns</text>
    <text class="series" x="245" y="123" text-anchor="end">sonic</text><rect x="260" y="109" width="192" height="19" rx="4" fill="#b388eb"/><text class="value" x="462" y="123">516.2 ns</text>
    <text class="series" x="245" y="151" text-anchor="end">sonic into</text><rect x="260" y="137" width="142" height="19" rx="4" fill="#f2c14e"/><text class="value" x="412" y="151">383.0 ns</text>
  </g>
  <g transform="translate(0,325)">
    <text class="group" x="40" y="13">map[string][]int</text>
    <text class="series" x="245" y="39" text-anchor="end">append</text><rect x="260" y="25" width="75" height="19" rx="4" fill="#50c878"/><text class="value" x="345" y="39">498.6 ns</text>
    <text class="series" x="245" y="67" text-anchor="end">marshal</text><rect x="260" y="53" width="104" height="19" rx="4" fill="#5aa9e6"/><text class="value" x="374" y="67">693.9 ns</text>
    <text class="series" x="245" y="95" text-anchor="end">stdlib</text><rect x="260" y="81" width="224" height="19" rx="4" fill="#ef8354"/><text class="value" x="494" y="95">1491 ns</text>
    <text class="series" x="245" y="123" text-anchor="end">sonic</text><rect x="260" y="109" width="72" height="19" rx="4" fill="#b388eb"/><text class="value" x="342" y="123">480.5 ns</text>
    <text class="series" x="245" y="151" text-anchor="end">sonic into</text><rect x="260" y="137" width="56" height="19" rx="4" fill="#f2c14e"/><text class="value" x="326" y="151">373.1 ns</text>
  </g>
  <g transform="translate(0,505)">
    <text class="group" x="40" y="13">map[string]any</text>
    <text class="series" x="245" y="39" text-anchor="end">append</text><rect x="260" y="25" width="75" height="19" rx="4" fill="#50c878"/><text class="value" x="345" y="39">329.6 ns</text>
    <text class="series" x="245" y="67" text-anchor="end">marshal</text><rect x="260" y="53" width="121" height="19" rx="4" fill="#5aa9e6"/><text class="value" x="391" y="67">531.5 ns</text>
    <text class="series" x="245" y="95" text-anchor="end">stdlib</text><rect x="260" y="81" width="490" height="19" rx="4" fill="#ef8354"/><text class="value" x="760" y="95">2155 ns</text>
    <text class="series" x="245" y="123" text-anchor="end">sonic</text><rect x="260" y="109" width="157" height="19" rx="4" fill="#b388eb"/><text class="value" x="427" y="123">692.0 ns</text>
    <text class="series" x="245" y="151" text-anchor="end">sonic into</text><rect x="260" y="137" width="126" height="19" rx="4" fill="#f2c14e"/><text class="value" x="396" y="151">553.1 ns</text>
  </g>
  <g transform="translate(0,685)">
    <text class="group" x="40" y="13">[]int</text>
    <text class="series" x="245" y="39" text-anchor="end">append</text><rect x="260" y="25" width="75" height="19" rx="4" fill="#50c878"/><text class="value" x="345" y="39">91.80 ns</text>
    <text class="series" x="245" y="67" text-anchor="end">marshal</text><rect x="260" y="53" width="158" height="19" rx="4" fill="#5aa9e6"/><text class="value" x="428" y="67">193.1 ns</text>
    <text class="series" x="245" y="95" text-anchor="end">stdlib</text><rect x="260" y="81" width="250" height="19" rx="4" fill="#ef8354"/><text class="value" x="520" y="95">305.5 ns</text>
    <text class="series" x="245" y="123" text-anchor="end">sonic</text><rect x="260" y="109" width="211" height="19" rx="4" fill="#b388eb"/><text class="value" x="481" y="123">258.5 ns</text>
    <text class="series" x="245" y="151" text-anchor="end">sonic into</text><rect x="260" y="137" width="128" height="19" rx="4" fill="#f2c14e"/><text class="value" x="398" y="151">156.9 ns</text>
  </g>
  <g transform="translate(0,865)">
    <text class="group" x="40" y="13">float32</text>
    <text class="series" x="245" y="39" text-anchor="end">append</text><rect x="260" y="25" width="75" height="19" rx="4" fill="#50c878"/><text class="value" x="345" y="39">37.40 ns</text>
    <text class="series" x="245" y="67" text-anchor="end">marshal</text><rect x="260" y="53" width="148" height="19" rx="4" fill="#5aa9e6"/><text class="value" x="418" y="67">73.85 ns</text>
    <text class="series" x="245" y="95" text-anchor="end">stdlib</text><rect x="260" y="81" width="187" height="19" rx="4" fill="#ef8354"/><text class="value" x="457" y="95">93.25 ns</text>
    <text class="series" x="245" y="123" text-anchor="end">sonic</text><rect x="260" y="109" width="186" height="19" rx="4" fill="#b388eb"/><text class="value" x="456" y="123">92.70 ns</text>
    <text class="series" x="245" y="151" text-anchor="end">sonic into</text><rect x="260" y="137" width="123" height="19" rx="4" fill="#f2c14e"/><text class="value" x="393" y="151">61.48 ns</text>
  </g>
  <g transform="translate(0,1045)">
    <text class="group" x="40" y="13">float64</text>
    <text class="series" x="245" y="39" text-anchor="end">append</text><rect x="260" y="25" width="75" height="19" rx="4" fill="#50c878"/><text class="value" x="345" y="39">69.18 ns</text>
    <text class="series" x="245" y="67" text-anchor="end">marshal</text><rect x="260" y="53" width="128" height="19" rx="4" fill="#5aa9e6"/><text class="value" x="398" y="67">118.1 ns</text>
    <text class="series" x="245" y="95" text-anchor="end">stdlib</text><rect x="260" y="81" width="156" height="19" rx="4" fill="#ef8354"/><text class="value" x="426" y="95">144.3 ns</text>
    <text class="series" x="245" y="123" text-anchor="end">sonic</text><rect x="260" y="109" width="137" height="19" rx="4" fill="#b388eb"/><text class="value" x="407" y="123">126.8 ns</text>
    <text class="series" x="245" y="151" text-anchor="end">sonic into</text><rect x="260" y="137" width="87" height="19" rx="4" fill="#f2c14e"/><text class="value" x="357" y="151">79.98 ns</text>
  </g>
  <g transform="translate(0,1225)">
    <text class="group" x="40" y="13">mixed struct</text>
    <text class="series" x="245" y="39" text-anchor="end">append</text><rect x="260" y="25" width="75" height="19" rx="4" fill="#50c878"/><text class="value" x="345" y="39">283.0 ns</text>
    <text class="series" x="245" y="67" text-anchor="end">marshal</text><rect x="260" y="53" width="133" height="19" rx="4" fill="#5aa9e6"/><text class="value" x="403" y="67">501.0 ns</text>
    <text class="series" x="245" y="95" text-anchor="end">stdlib</text><rect x="260" y="81" width="283" height="19" rx="4" fill="#ef8354"/><text class="value" x="553" y="95">1067 ns</text>
    <text class="series" x="245" y="123" text-anchor="end">sonic</text><rect x="260" y="109" width="187" height="19" rx="4" fill="#b388eb"/><text class="value" x="457" y="123">705.8 ns</text>
    <text class="series" x="245" y="151" text-anchor="end">sonic into</text><rect x="260" y="137" width="118" height="19" rx="4" fill="#f2c14e"/><text class="value" x="388" y="151">444.7 ns</text>
  </g>
</svg>
